<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" width="100%" height="100%" style="background-color: #FAF9F5; font-family: system-ui, -apple-system, sans-serif;">
  <!-- Border and Background Frame -->
  <rect x="20" y="20" width="760" height="1060" rx="24" fill="#ffffff" stroke="#ca8a04" stroke-width="4" />
  <rect x="35" y="35" width="730" height="1030" rx="16" fill="none" stroke="#fef08a" stroke-width="2" />

  <!-- Name & Date Fields (Standard school layout at top-right/left) -->
  <g transform="translate(50, 45)" font-size="13" font-weight="bold" fill="#713f12">
    <text x="0" y="20">STUDENT NAME: _____________________________________</text>
    <text x="450" y="20">DATE: ________________________</text>
  </g>

  <!-- Worksheet Header banner -->
  <g transform="translate(50, 85)">
    <rect x="0" y="0" width="700" height="90" rx="16" fill="#fef9c3" stroke="#fef08a" stroke-width="1" />
    <text x="25" y="40" fill="#854d0e" font-size="24" font-weight="900" letter-spacing="-0.5">🌱 Compost Kids Activity Worksheet</text>
    <text x="25" y="65" fill="#a16207" font-size="13" font-weight="600">Composting is Nature's way of recycling! Let's explore the recipe of healthy soil.</text>
  </g>

  <!-- Part 1: Fill in the Blanks -->
  <g transform="translate(50, 200)">
    <text x="0" y="20" fill="#854d0e" font-size="18" font-weight="900">Part 1: The Secret Soil Recipe (Fill in the blanks)</text>
    <text x="0" y="42" fill="#4b5563" font-size="13" font-weight="500">Read the context and fill in the missing words using the word bank below.</text>

    <!-- Word Bank Box -->
    <rect x="0" y="60" width="700" height="45" rx="8" fill="#fafaf9" stroke="#e7e5e4" stroke-width="1" />
    <text x="350" y="87" text-anchor="middle" fill="#1c1917" font-size="14" font-weight="bold" letter-spacing="2">
      NITROGEN  •  WATER  •  CARBON  •  OXYGEN  •  MICROBES
    </text>

    <!-- Sentences with Fill lines -->
    <g transform="translate(10, 135)" font-size="14" fill="#1c1917" font-weight="500">
      <text x="0" y="20">1. Clean organic waste decomposes with the help of tiny living organisms called ______________________.</text>
      <text x="0" y="55">2. Fruit peels and fresh grass provide ______________________, which gives microbes energy to grow.</text>
      <text x="0" y="90">3. Dry autumn leaves and cardboard provide ______________________, which serves as the pile's fuel.</text>
      <text x="0" y="125">4. Microbes breathe air! To keep them healthy, we must turn our compost heap to add ______________________.</text>
      <text x="0" y="160">5. Keep compost moist. It should feel like a squeezed sponge with ______________________.</text>
    </g>
  </g>

  <!-- Part 2: Green or Brown? (Categorization Challenge) -->
  <g transform="translate(50, 550)">
    <text x="0" y="20" fill="#854d0e" font-size="18" font-weight="900">Part 2: Waste Sorting Challenge!</text>
    <text x="0" y="42" fill="#4b5563" font-size="13" font-weight="500">Draw a line connecting each item to its correct category: GREEN or BROWN.</text>

    <!-- Left Column: Items to sort -->
    <g transform="translate(30, 80)" font-size="14" font-weight="bold" fill="#44403c">
      <!-- Item A -->
      <circle cx="-10" cy="15" r="5" fill="#d6d3d1" />
      <text x="10" y="20">A) Apple Core</text>
      
      <!-- Item B -->
      <circle cx="-10" cy="65" r="5" fill="#d6d3d1" />
      <text x="10" y="70">B) Egg Carton Box</text>
      
      <!-- Item C -->
      <circle cx="-10" cy="115" r="5" fill="#d6d3d1" />
      <text x="10" y="120">C) Fresh Grass Trimmings</text>
      
      <!-- Item D -->
      <circle cx="-10" cy="165" r="5" fill="#d6d3d1" />
      <text x="10" y="170">D) Dry Autumn Leaves</text>
      
      <!-- Item E -->
      <circle cx="-10" cy="215" r="5" fill="#d6d3d1" />
      <text x="10" y="220">E) Coffee Grounds</text>
    </g>

    <!-- Middle: Drawing Area (Kids draw lines between dots) -->
    <g transform="translate(280, 80)">
      <!-- Line Connection Anchor Circles -->
      <circle cx="0" cy="15" r="8" fill="none" stroke="#d6d3d1" stroke-width="2" />
      <circle cx="0" cy="65" r="8" fill="none" stroke="#d6d3d1" stroke-width="2" />
      <circle cx="0" cy="115" r="8" fill="none" stroke="#d6d3d1" stroke-width="2" />
      <circle cx="0" cy="165" r="8" fill="none" stroke="#d6d3d1" stroke-width="2" />
      <circle cx="0" cy="215" r="8" fill="none" stroke="#d6d3d1" stroke-width="2" />

      <circle cx="110" cy="55" r="8" fill="none" stroke="#d6d3d1" stroke-width="2" />
      <circle cx="110" cy="175" r="8" fill="none" stroke="#d6d3d1" stroke-width="2" />
    </g>

    <!-- Right Column: Bins -->
    <!-- Green Bin Card -->
    <g transform="translate(430, 110)">
      <rect x="0" y="0" width="240" height="60" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="2" />
      <text x="120" y="36" text-anchor="middle" fill="#166534" font-size="16" font-weight="900">🟢 GREEN bin (Nitrogen)</text>
    </g>
    <!-- Brown Bin Card -->
    <g transform="translate(430, 210)">
      <rect x="0" y="0" width="240" height="60" rx="12" fill="#fdf8f6" stroke="#f5d0c5" stroke-width="2" />
      <text x="120" y="36" text-anchor="middle" fill="#78350f" font-size="16" font-weight="900">🟤 BROWN bin (Carbon)</text>
    </g>
  </g>

  <!-- Part 3: Earthworm Bonus Quiz -->
  <g transform="translate(50, 895)">
    <text x="0" y="20" fill="#854d0e" font-size="18" font-weight="900">Part 3: Earthworm Bonus Question!</text>
    
    <!-- Wrapped question to prevent overlap with grade card -->
    <text x="0" y="42" fill="#4b5563" font-size="12.5" font-weight="600">True or False? Earthworms love digging tunnels because they</text>
    <text x="0" y="58" fill="#4b5563" font-size="12.5" font-weight="600">swallow soil and turn it into rich plant food.</text>
    
    <g transform="translate(10, 80)" font-size="14" font-weight="bold">
      <!-- Options to circle -->
      <rect x="0" y="0" width="100" height="35" rx="8" fill="none" stroke="#a16207" stroke-width="1" />
      <text x="50" y="22" text-anchor="middle" fill="#854d0e">[ TRUE ]</text>

      <rect x="120" y="0" width="100" height="35" rx="8" fill="none" stroke="#a16207" stroke-width="1" />
      <text x="170" y="22" text-anchor="middle" fill="#854d0e">[ FALSE ]</text>
    </g>

    <!-- Teacher Checkbox and Grade Panel (No overlap with text!) -->
    <g transform="translate(480, 45)">
      <rect x="0" y="0" width="190" height="70" rx="10" fill="#fafaf9" stroke="#e7e5e4" stroke-width="1.5" />
      <text x="20" y="28" fill="#57534e" font-size="11" font-weight="bold">TEACHER'S SCORE:</text>
      <text x="20" y="54" fill="#1c1917" font-size="18" font-weight="900">_______ / 100</text>
    </g>
  </g>

  <!-- Bottom Footer -->
  <text x="400" y="1055" text-anchor="middle" fill="#854d0e" font-size="11" font-weight="bold">Designed for Classroom and Homeschool Environmental Education</text>
</svg>
