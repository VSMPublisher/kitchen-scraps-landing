<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" width="100%" height="100%" style="background-color: #FAF9F5; font-family: system-ui, -apple-system, sans-serif;">
  <!-- Border and Background Frame -->
  <rect x="20" y="20" width="760" height="1060" rx="24" fill="#ffffff" stroke="#065f46" stroke-width="4" />
  <rect x="35" y="35" width="730" height="1030" rx="16" fill="none" stroke="#a7f3d0" stroke-width="1.5" stroke-dasharray="8,8" />

  <!-- Header Banner -->
  <path d="M 35 35 L 765 35 L 765 160 L 35 160 Z" fill="#065f46" rx="16" />
  <text x="400" y="85" text-anchor="middle" fill="#fef08a" font-size="34" font-weight="900" letter-spacing="1">KITCHEN SCRAPS COMPOSTING</text>
  <text x="400" y="125" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700" letter-spacing="3">CLASSROOM WASTE SORTING FLOWCHART</text>

  <!-- Section: YES (Greens & Browns) -->
  <g transform="translate(50, 190)">
    <!-- Greens Section -->
    <rect x="0" y="0" width="335" height="420" rx="16" fill="#f0fdf4" stroke="#86efac" stroke-width="2" />
    <!-- Section Header -->
    <path d="M 0 0 L 335 0 L 335 50 L 0 50 Z" fill="#166534" />
    <text x="167" y="32" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="800">🟢 NITROGEN RICH "GREENS"</text>
    
    <!-- Items -->
    <g transform="translate(25, 75)" font-size="13" font-weight="600" fill="#14532d">
      <!-- Item 1 -->
      <circle cx="10" cy="15" r="5" fill="#22c55e" />
      <text x="25" y="20" font-size="14" font-weight="bold">Fruit &amp; Vegetable Peels</text>
      <text x="25" y="36" font-size="11" fill="#166534" font-weight="normal">Apple cores, banana skins, citrus rinds</text>

      <!-- Item 2 -->
      <circle cx="10" cy="65" r="5" fill="#22c55e" />
      <text x="25" y="70" font-size="14" font-weight="bold">Coffee Grounds &amp; Filters</text>
      <text x="25" y="86" font-size="11" fill="#166534" font-weight="normal">Includes unbleached paper coffee filters</text>

      <!-- Item 3 -->
      <circle cx="10" cy="115" r="5" fill="#22c55e" />
      <text x="25" y="120" font-size="14" font-weight="bold">Fresh Grass &amp; Plant Clippings</text>
      <text x="25" y="136" font-size="11" fill="#166534" font-weight="normal">Never use weed seeds or sprayed garden waste</text>

      <!-- Item 4 -->
      <circle cx="10" cy="165" r="5" fill="#22c55e" />
      <text x="25" y="170" font-size="14" font-weight="bold">Crushed Eggshells</text>
      <text x="25" y="186" font-size="11" fill="#166534" font-weight="normal">Rinse and crush to accelerate breakdown</text>

      <!-- Item 5 -->
      <circle cx="10" cy="215" r="5" fill="#22c55e" />
      <text x="25" y="220" font-size="14" font-weight="bold">Tea Bags &amp; Leaves</text>
      <text x="25" y="236" font-size="11" fill="#166534" font-weight="normal">Ensure bags are paper/plastic-free fiber</text>
    </g>

    <!-- Footer Tip -->
    <rect x="15" y="340" width="305" height="60" rx="10" fill="#dcfce7" stroke="#bbf7d0" stroke-width="1" />
    <text x="25" y="362" font-size="11" font-weight="bold" fill="#14532d">PRO TIP:</text>
    <text x="25" y="380" font-size="10.5" fill="#166534">Chop greens into smaller pieces to speed up the</text>
    <text x="25" y="394" font-size="10.5" fill="#166534">microbial composting process! (1-2 inches max)</text>
  </g>

  <g transform="translate(415, 190)">
    <!-- Browns Section -->
    <rect x="0" y="0" width="335" height="420" rx="16" fill="#fdf8f6" stroke="#f5d0c5" stroke-width="2" />
    <!-- Section Header -->
    <path d="M 0 0 L 335 0 L 335 50 L 0 50 Z" fill="#78350f" />
    <text x="167" y="32" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="800">🟤 CARBON RICH "BROWNS"</text>
    
    <!-- Items -->
    <g transform="translate(25, 75)" font-size="13" font-weight="600" fill="#7c2d12">
      <!-- Item 1 -->
      <circle cx="10" cy="15" r="5" fill="#ca8a04" />
      <text x="25" y="20" font-size="14" font-weight="bold">Dry Autumn Leaves</text>
      <text x="25" y="36" font-size="11" fill="#9a3412" font-weight="normal">An excellent source of rich carbon structures</text>

      <!-- Item 2 -->
      <circle cx="10" cy="65" r="5" fill="#ca8a04" />
      <text x="25" y="70" font-size="14" font-weight="bold">Shredded Cardboard &amp; Paper</text>
      <text x="25" y="86" font-size="11" fill="#9a3412" font-weight="normal">Uncoated newspapers, egg cartons, toilet tubes</text>

      <!-- Item 3 -->
      <circle cx="10" cy="115" r="5" fill="#ca8a04" />
      <text x="25" y="120" font-size="14" font-weight="bold">Wood Chips &amp; Sawdust</text>
      <text x="25" y="136" font-size="11" fill="#9a3412" font-weight="normal">Ensure wood is untreated and chemical-free</text>

      <!-- Item 4 -->
      <circle cx="10" cy="165" r="5" fill="#ca8a04" />
      <text x="25" y="170" font-size="14" font-weight="bold">Dry Straw &amp; Hay</text>
      <text x="25" y="186" font-size="11" fill="#9a3412" font-weight="normal">Loosens the pile texture to optimize airflow</text>

      <!-- Item 5 -->
      <circle cx="10" cy="215" r="5" fill="#ca8a04" />
      <text x="25" y="220" font-size="14" font-weight="bold">Nut Shells</text>
      <text x="25" y="236" font-size="11" fill="#9a3412" font-weight="normal">Walnut, peanut, almond shells (no walnut meat)</text>
    </g>

    <!-- Footer Tip -->
    <rect x="15" y="340" width="305" height="60" rx="10" fill="#fef3c7" stroke="#fde68a" stroke-width="1" />
    <text x="25" y="362" font-size="11" font-weight="bold" fill="#78350f">PRO TIP:</text>
    <text x="25" y="380" font-size="10.5" fill="#92400e">Maintain a balanced 2:1 ratio of Browns to Greens.</text>
    <text x="25" y="394" font-size="10.5" fill="#92400e">This keeps your pile sweet-smelling and aerated!</text>
  </g>

  <!-- Section: NO (Strictly Forbidden Items) -->
  <g transform="translate(50, 630)">
    <rect x="0" y="0" width="700" height="275" rx="16" fill="#fef2f2" stroke="#fca5a5" stroke-width="3" />
    <!-- Section Header -->
    <path d="M 0 0 L 700 0 L 700 50 L 0 50 Z" fill="#991b1b" />
    <text x="350" y="32" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="900" letter-spacing="1">🛑 STRICTLY FORBIDDEN (DO NOT COMPOST)</text>

    <!-- Column 1 -->
    <g transform="translate(30, 55)" font-size="12" font-weight="bold" fill="#7f1d1d">
      <!-- Item 1 -->
      <text x="0" y="20" font-size="13.5">❌ Meat, Bones, &amp; Fish Scraps</text>
      <text x="22" y="35" font-size="10.5" fill="#991b1b" font-weight="normal">Attracts severe pests, rodents, and bad odor.</text>

      <!-- Item 2 -->
      <text x="0" y="60" font-size="13.5">❌ Dairy Products &amp; Oils</text>
      <text x="22" y="75" font-size="10.5" fill="#991b1b" font-weight="normal">Butter, cheese, milk, grease lock out oxygen.</text>

      <!-- Item 3 -->
      <text x="0" y="100" font-size="13.5">❌ Dog or Cat Waste</text>
      <text x="22" y="115" font-size="10.5" fill="#991b1b" font-weight="normal">Contains dangerous parasites &amp; pathogens.</text>

      <!-- Item 4 -->
      <text x="0" y="140" font-size="13.5">❌ Diseased Plants or Seeds</text>
      <text x="22" y="155" font-size="10.5" fill="#991b1b" font-weight="normal">Pathogens &amp; weeds survive and spread in garden.</text>
    </g>

    <!-- Column 2 -->
    <g transform="translate(380, 55)" font-size="12" font-weight="bold" fill="#7f1d1d">
      <!-- Item 1 -->
      <text x="0" y="20" font-size="13.5">❌ Glossy or Colored Paper</text>
      <text x="22" y="35" font-size="10.5" fill="#991b1b" font-weight="normal">Magazine paper containing toxic chemical inks.</text>

      <!-- Item 2 -->
      <text x="0" y="60" font-size="13.5">❌ Pressure-Treated Wood</text>
      <text x="22" y="75" font-size="10.5" fill="#991b1b" font-weight="normal">Treated wood contains toxic arsenic preservatives.</text>

      <!-- Item 3 -->
      <text x="0" y="100" font-size="13.5">❌ Plastics, Metal, &amp; Glass</text>
      <text x="22" y="115" font-size="10.5" fill="#991b1b" font-weight="normal">Non-biodegradable trash that destroys soil structures.</text>

      <!-- Item 4 -->
      <text x="0" y="140" font-size="13.5">❌ Citrus Peels (Large amounts)</text>
      <text x="22" y="155" font-size="10.5" fill="#991b1b" font-weight="normal">High acidity slows down earthworm digestion.</text>
    </g>

    <!-- Warning banner -->
    <rect x="30" y="220" width="640" height="40" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="1" />
    <text x="350" y="244" text-anchor="middle" fill="#991b1b" font-size="11" font-weight="bold">WARNING: Adding any forbidden items will ruin your soil health, lock out air, or attract pests!</text>
  </g>

  <!-- Footer Section: Text on Left, QR Code Card on Right -->
  <g transform="translate(50, 925)">
    <!-- Left Text Details -->
    <text x="0" y="20" fill="#065f46" font-size="14" font-weight="900" letter-spacing="0.5">🌱 KITCHEN SCRAPS COMPANION APP</text>
    <text x="0" y="44" fill="#1f2937" font-size="12" font-weight="bold">Develop Your Eco-Intelligence Offline!</text>
    <text x="0" y="64" fill="#4b5563" font-size="11" font-weight="medium">Get our secure, zero-permission 60-question trivia app.</text>
    <text x="0" y="82" fill="#4b5563" font-size="11" font-weight="medium">Scan the QR code to launch our landing page and download the APK.</text>
    <text x="0" y="105" fill="#059669" font-size="12" font-weight="extrabold">kitchen-scraps.web.app</text>

    <!-- Right QR Code Card -->
    <g transform="translate(550, -10)">
      <rect x="0" y="0" width="120" height="120" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5" />
      <image href="https://api.qrserver.com/v1/create-qr-code/?size=100x100&amp;data=https://kitchen-scraps.web.app/" x="15" y="10" width="90" height="90" />
      <text x="60" y="112" text-anchor="middle" fill="#065f46" font-size="8" font-weight="900">SCAN TO LAUNCH</text>
    </g>
  </g>
</svg>
